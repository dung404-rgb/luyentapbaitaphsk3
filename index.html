    function openTab(evt, tabId) {
        let tabContents = document.getElementsByClassName("tab-content");
        for (let i = 0; i < tabContents.length; i++) {
            tabContents[i].classList.remove("active");
        }
        let tabBtns = document.getElementsByClassName("tab-btn");
        for (let i = 0; i < tabBtns.length; i++) {
            tabBtns[i].classList.remove("active");
        }
        document.getElementById(tabId).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    function loadAllData() {
        let lesson = document.getElementById("globalLessonSelect").value;
        currentLessonVocab = vocabData[lesson] || [];
        wrongAttempts = 0;
        nextWord();
        renderFill(lesson);
        renderRead(lesson);
    }

    let currentLessonVocab = [];
    let currentWord = {};
    let wrongAttempts = 0;

    function nextWord() {
        if (currentLessonVocab.length === 0) {
            document.getElementById("wordDisplay").innerText = "Chưa có dữ liệu";
            document.getElementById("pinyinInput").value = "";
            document.getElementById("meaningInput").value = "";
            return;
        }
        const randomIndex = Math.floor(Math.random() * currentLessonVocab.length);
        currentWord = currentLessonVocab[randomIndex];
        document.getElementById("wordDisplay").innerText = currentWord.word;
        document.getElementById("pinyinInput").value = "";
        document.getElementById("meaningInput").value = "";
        document.getElementById("result-vocab").innerText = "";
        document.getElementById("result-vocab").className = "";
        wrongAttempts = 0;
    }

    function removeAccents(str) {
        return str.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim();
    }

    function checkVocab() {
        if(!currentWord.pinyin) return;
        const userPinyin = document.getElementById("pinyinInput").value;
        const userMeaning = document.getElementById("meaningInput").value;
        const isPinyinCorrect = removeAccents(userPinyin) === removeAccents(currentWord.pinyin);
        const isMeaningCorrect = removeAccents(userMeaning).includes(removeAccents(currentWord.meaning)) || 
                                 removeAccents(currentWord.meaning).includes(removeAccents(userMeaning));
        const resultDiv = document.getElementById("result-vocab");

        if (isPinyinCorrect && isMeaningCorrect && userMeaning !== "") {
            resultDiv.innerText = "🎉 Chính xác!";
            resultDiv.className = "correct";
        } else {
            wrongAttempts++;
            if (wrongAttempts >= 3) {
                resultDiv.innerText = `❌ Bạn đã sai 3 lần.\nĐáp án: [ ${currentWord.pinyin} | ${currentWord.meaning} ]`;
                resultDiv.className = "incorrect";
            } else {
                resultDiv.innerText = `⚠️ Sai rồi. Bạn còn ${3 - wrongAttempts} lần thử.`;
                resultDiv.className = "warning";
            }
        }
    }

    function renderFill(lesson) {
        let container = document.getElementById("fillContainer");
        let bankDisplay = document.getElementById("wordBankDisplay");
        let resultDiv = document.getElementById("result-fill");
        container.innerHTML = "";
        resultDiv.innerHTML = "";
        
        if (!fillData[lesson]) {
            bankDisplay.innerText = "Chưa có dữ liệu bài tập cho bài này.";
            return;
        }

        bankDisplay.innerText = "Danh sách từ: " + fillData[lesson].wordBank;
        let questions = fillData[lesson].questions;

        questions.forEach((q, index) => {
            let div = document.createElement("div");
            div.className = "question-box";
            let parts = q.q.split("________");
            div.innerHTML = `<strong>Câu ${index + 1}:</strong> ${parts[0]} <input type="text" id="fill-ans-${index}" style="width: 100px; padding: 5px; margin: 0 5px;"> ${parts[1] || ""} <span id="fill-res-${index}"></span>`;
            container.appendChild(div);
        });
    }

    function checkFill() {
        let lesson = document.getElementById("globalLessonSelect").value;
        if (!fillData[lesson]) return;
        let questions = fillData[lesson].questions;
        let score = 0;

        questions.forEach((q, index) => {
            let userAns = document.getElementById(`fill-ans-${index}`).value.trim();
            let resSpan = document.getElementById(`fill-res-${index}`);
            if (userAns === q.a) {
                resSpan.innerHTML = "✔️";
                resSpan.className = "correct";
                score++;
            } else {
                resSpan.innerHTML = `❌ (${q.a})`;
                resSpan.className = "incorrect";
            }
        });
        document.getElementById("result-fill").innerHTML = `<h3 class="correct">Bạn đúng ${score} / ${questions.length} câu!</h3>`;
    }

    function renderRead(lesson) {
        let container = document.getElementById("readContainer");
        let resultDiv = document.getElementById("result-read");
        container.innerHTML = "";
        resultDiv.innerHTML = "";

        if (!readData[lesson]) {
            container.innerHTML = "<p>Chưa có dữ liệu bài tập cho bài này.</p>";
            return;
        }

        let passages = readData[lesson];
        let globalQuestionCount = 0;

        passages.forEach((p, pIndex) => {
            let pDiv = document.createElement("div");
            pDiv.innerHTML = `<div class="passage"><strong>Đoạn văn ${pIndex + 1}:</strong><br>${p.passage}</div>`;
            
            p.questions.forEach((q, qIndex) => {
                let qDiv = document.createElement("div");
                qDiv.className = "question-box";
                let optionsHtml = q.options.map((opt, optIndex) => 
                    `<label><input type="radio" name="read-q-${globalQuestionCount}" value="${optIndex}"> ${opt}</label>`
                ).join("");
                
                qDiv.innerHTML = `<strong>${q.q}</strong><div class="options">${optionsHtml}</div><div id="read-res-${globalQuestionCount}"></div>`;
                pDiv.appendChild(qDiv);
                globalQuestionCount++;
            });
            container.appendChild(pDiv);
        });
    }

    function checkRead() {
        let lesson = document.getElementById("globalLessonSelect").value;
        if (!readData[lesson]) return;
        
        let score = 0;
        let globalQuestionCount = 0;

        readData[lesson].forEach((p) => {
            p.questions.forEach((q) => {
                let selected = document.querySelector(`input[name="read-q-${globalQuestionCount}"]:checked`);
                let resDiv = document.getElementById(`read-res-${globalQuestionCount}`);
                
                if (selected && parseInt(selected.value) === q.a) {
                    resDiv.innerHTML = "✔️ Chính xác!";
                    resDiv.className = "correct";
                    score++;
                } else {
                    resDiv.innerHTML = `❌ Sai. Đáp án đúng là: ${q.options[q.a]}`;
                    resDiv.className = "incorrect";
                }
                globalQuestionCount++;
            });
        });
        document.getElementById("result-read").innerHTML = `<h3 class="correct">Bạn đúng ${score} / ${globalQuestionCount} câu!</h3>`;
    }

    document.addEventListener("DOMContentLoaded", function() {
        document.getElementById("meaningInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                checkVocab();
            }
        });
        document.getElementById("pinyinInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                checkVocab();
            }
        });
    });

    window.onload = loadAllData;
</script>
